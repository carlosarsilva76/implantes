<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1B92C6">
<title>Stock de Implantes · Dentalsaúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFF5F9; --card:#FFFFFF; --ink:#33373A; --muted:#7A8488;
  --line:#E4EBEF; --primary:#1B92C6; --primary-d:#127099;
  --blue:#40B4E5; --grey:#545759;
  --ok:#2F9E44; --amber:#C8890A; --red:#D64545;
  --amber-bg:#FBF1DA; --red-bg:#FBE3E3; --ok-bg:#E5F4E9;
  --shadow:0 1px 2px rgba(20,40,55,.04),0 8px 24px rgba(20,60,90,.07);
  --radius:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  padding-bottom:calc(78px + env(safe-area-inset-bottom));min-height:100vh;font-size:15px}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
.serif{font-family:'Fraunces',serif}

/* ---- Topbar ---- */
.top{position:sticky;top:0;z-index:20;background:var(--primary);color:#fff;
  padding:calc(14px + env(safe-area-inset-top)) 18px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 14px rgba(20,60,90,.12)}
.top .logo{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);display:grid;place-items:center;flex:none}
.top h1{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.1}
.top .sub{font-size:11.5px;opacity:.8;font-weight:500}
.top .acts{margin-left:auto;display:flex;gap:6px}
.iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.15);color:#fff}
.iconbtn:active{transform:scale(.94)}

/* ---- Search + chips ---- */
.searchwrap{padding:14px 16px 6px}
.search{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:11px 14px;box-shadow:var(--shadow)}
.search input{border:none;outline:none;width:100%;background:none;font-size:15px;color:var(--ink)}
.search svg{flex:none;color:var(--muted)}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 4px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;padding:7px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;
  font-size:13.5px;font-weight:500;color:var(--muted);white-space:nowrap}
.chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* ---- Stats row ---- */
.stats{display:flex;gap:10px;padding:8px 16px 4px}
.stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px;box-shadow:var(--shadow)}
.stat .n{font-family:'Fraunces',serif;font-size:21px;font-weight:600;line-height:1}
.stat .l{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:500}
.stat.clk{cursor:pointer;transition:transform .1s}
.stat.clk:active{transform:scale(.95)}
.stat.act{outline:2px solid var(--primary);outline-offset:-1px;background:#EAF4FA}

/* ---- Product list ---- */
.list{padding:10px 16px 20px;display:flex;flex-direction:column;gap:11px}
.pcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.pcard .head{display:flex;align-items:center;gap:13px;padding:14px}
.pthumb{width:46px;height:46px;border-radius:12px;flex:none;background:#EAF4FA;display:grid;place-items:center;
  color:var(--primary);font-weight:700;font-size:18px;overflow:hidden}
.pthumb img{width:100%;height:100%;object-fit:cover}
.pinfo{flex:1;min-width:0}
.pname{font-weight:600;font-size:15px;line-height:1.25}
.pmeta{font-size:12.5px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pqty{text-align:right;flex:none}
.pqty .big{font-family:'Fraunces',serif;font-size:24px;font-weight:600;line-height:1}
.pqty .u{font-size:11px;color:var(--muted)}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.brand{background:#EAF4FA;color:var(--primary-d)}
.variants{border-top:1px dashed var(--line);padding:4px 14px 8px;display:none;background:#FBFDFE}
.variants.open{display:block}
.vrow{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line)}
.vrow:last-child{border-bottom:none}
.vrow .vb{font-size:12px;font-weight:700;color:var(--primary-d);background:#EAF4FA;padding:2px 8px;border-radius:8px;flex:none}
.vrow .vref{font-size:12px;color:var(--muted);font-family:ui-monospace,monospace}
.vrow .vd{flex:1;min-width:0;font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stepper{display:flex;align-items:center;gap:8px;flex:none}
.stepper button{width:30px;height:30px;border-radius:9px;background:#fff;border:1px solid var(--line);
  font-size:18px;font-weight:600;color:var(--primary);display:grid;place-items:center}
.stepper button:active{transform:scale(.92)}
.stepper .vq{min-width:26px;text-align:center;font-weight:700;font-size:16px}

/* ---- Bottom nav ---- */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.94);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);
  display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:500;padding:4px 0;position:relative}
.nav button.on{color:var(--primary)}
.nav button svg{width:23px;height:23px}
.nav .ncart{position:absolute;top:-2px;right:50%;transform:translateX(20px);min-width:17px;height:17px;
  padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:none;place-items:center}

/* ---- FAB ---- */
.fab{position:fixed;right:18px;bottom:calc(86px + env(safe-area-inset-bottom));z-index:25;
  width:56px;height:56px;border-radius:18px;background:var(--primary);color:#fff;
  display:grid;place-items:center;box-shadow:0 8px 22px rgba(27,146,198,.4)}
.fab:active{transform:scale(.95)}
.fab svg{width:26px;height:26px}

/* ---- Sheets ---- */
.sheet-bg{position:fixed;inset:0;background:rgba(16,33,31,.42);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--card);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;
  border-radius:22px 22px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));animation:rise .22s ease both}
@media(min-width:560px){.sheet-bg{align-items:center}.sheet{border-radius:22px}}
@keyframes rise{from{transform:translateY(28px);opacity:.4}to{transform:translateY(0);opacity:1}}
.sheet .grab{width:38px;height:4px;border-radius:3px;background:var(--line);margin:0 auto 14px}
.sheet h2{font-family:'Fraunces',serif;font-size:21px;margin-bottom:3px}
.sheet .ssub{color:var(--muted);font-size:13px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;
  padding:11px 13px;background:#FBFDFE;color:var(--ink);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:#fff}
.row2{display:flex;gap:10px}.row2>*{flex:1}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:13px;
  background:var(--primary);color:#fff;font-weight:600;font-size:15px}
.btn:active{transform:scale(.98)}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.red{background:var(--red)}.btn.ok{background:var(--ok)}.btn.grey{background:var(--grey)}
.btn[disabled]{opacity:.55}
.btnrow{display:flex;gap:10px;margin-top:6px}
.msg{padding:11px 13px;border-radius:11px;font-size:13.5px;font-weight:500;margin:8px 0;display:none}
.msg.show{display:block}
.msg.ok{background:var(--ok-bg);color:var(--ok)}
.msg.warn{background:var(--amber-bg);color:var(--amber)}
.msg.err{background:var(--red-bg);color:var(--red)}
.varedit{border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px;background:#FBFDFE;position:relative}
.varedit .del{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:8px;background:var(--red-bg);color:var(--red);display:grid;place-items:center}
.empty{text-align:center;padding:50px 24px;color:var(--muted)}
.empty svg{width:54px;height:54px;opacity:.4;margin-bottom:12px}
.dz{border:2px dashed var(--line);border-radius:14px;padding:24px;text-align:center;color:var(--muted);background:#FBFDFE}
.dz svg{width:40px;height:40px;opacity:.5;margin-bottom:8px}
.spin{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.cartitem{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.cartdel{width:36px;height:36px;border-radius:10px;background:var(--red-bg);color:var(--red);display:grid;place-items:center;flex:none;font-size:16px}
.cartdel:active{transform:scale(.92)}
.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:#22343b;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:60;
  box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}


/* ---- Logo Dentalsaúde ---- */
.brandwrap{display:flex;flex-direction:column;gap:3px;min-width:0}
.top .brand{height:21px;width:auto;display:block}
.top .ttl{font-size:12px;font-weight:500;opacity:.92;line-height:1}
#authgate .loginlogo{display:block;width:210px;max-width:72%;height:auto;margin:0 auto 20px}

/* ---- Auth gate ---- */
#authgate{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:#0d2c3a;padding:24px}
#authgate .box{background:#fff;border-radius:22px;padding:30px 24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#authgate .logo{width:54px;height:54px;border-radius:16px;background:var(--primary);display:grid;place-items:center;margin:0 auto 16px;color:#fff}
#authgate h2{font-family:'Fraunces',serif;text-align:center;font-size:23px;margin-bottom:4px}
#authgate p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
#authgate input{width:100%;border:1px solid var(--line);border-radius:12px;padding:13px;margin-bottom:11px;outline:none;background:#FBFDFE}
#authgate .err{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-bottom:6px}
.hidden{display:none!important}
</style>
</head>

  VARIDX={};

  (vars||[]).forEach(v=>{VARIDX[v.id]=v;(byProd[v.produto_id]=byProd[v.produto_id]||[]).push(v);});
  PRODUTOS=(prods||[]).map(p=>{
    const vs=byProd[p.id]||[];
    const total=vs.reduce((s,v)=>s+(v.quantidade||0),0);
    return {...p,variantes:vs,total};
  });
  const baseCats=['Implante','Protético','Consumivel','Outro'];
  let tabCats=[];
  try{const{data:cc,error:ec}=await sb.from('imp_categorias').select('nome');if(!ec&&cc){tabCats=cc.map(x=>x.nome);CATS_TABLE=true;}else{CATS_TABLE=false;}}catch(e){CATS_TABLE=false;}
  CATEGORIAS=Array.from(new Set([...(CATS_TABLE?tabCats:baseCats),...PRODUTOS.map(p=>p.categoria).filter(Boolean)])).sort((a,b)=>a.localeCompare(b));

};

function renderCats(){
  const cats=['Todas',...CATEGORIAS];

}
window.criarCategoria=async function(){
  const nome=(prompt('Nome da nova categoria:')||'').trim();
  if(!nome)return;
  if(CATEGORIAS.some(c=>c.toLowerCase()===nome.toLowerCase())){toast('Essa categoria já existe');return;}
  if(!CATS_TABLE){toast('Corre primeiro o SQL "categorias_implantes.sql" no Supabase');return;}
  const{error}=await sb.from('imp_categorias').insert({nome});
  if(error){toast('Erro: '+error.message);return;}
  toast('Categoria criada ✓');
  await loadStock();
};
window.setCat=c=>{CURCAT=c;renderCats();renderStock();};

function renderStats(){
  const refs=PRODUTOS.reduce((s,p)=>s+p.variantes.length,0);
  const un=PRODUTOS.reduce((s,p)=>s+p.total,0);
  const baixo=PRODUTOS.filter(p=>p.total>0&&p.total<=3).length;
  const rutura=PRODUTOS.filter(p=>p.total===0).length;
  $('stats').innerHTML=`
    <div class="stat"><div class="n">${PRODUTOS.length}</div><div class="l">Produtos</div></div>
    <div class="stat"><div class="n">${un}</div><div class="l">Unidades</div></div>

    <div class="stat clk ${CURFILTER==='rutura'?'act':''}" onclick="setFilter('rutura')"><div class="n" style="color:var(--red)">${rutura}</div><div class="l">Em rutura</div></div>`;
}

  CURFILTER=(CURFILTER===f)?'todos':f;

};

function statusBadge(total){
  if(total===0)return '<span class="badge red">Rutura</span>';
  if(total<=3)return '<span class="badge amber">Baixo</span>';
  return '<span class="badge ok">OK</span>';
}

window.renderStock=function(){
  const q=($('q').value||'').toLowerCase().trim();
  let list=PRODUTOS.slice();
  if(CURCAT!=='Todas')list=list.filter(p=>p.categoria===CURCAT);
  if(CURFILTER==='baixo')list=list.filter(p=>p.total>0&&p.total<=3);
  else if(CURFILTER==='rutura')list=list.filter(p=>p.total===0);
  if(q)list=list.filter(p=>{
    if(p.nome.toLowerCase().includes(q))return true;
    return p.variantes.some(v=>(v.ref||'').toLowerCase().includes(q)||(v.marca||'').toLowerCase().includes(q)||(v.descricao||'').toLowerCase().includes(q));
  });
  list.sort((a,b)=>a.total-b.total||a.nome.localeCompare(b.nome));
  let banner='';

  }

    const semQ=q?`<div>Sem resultados para "<strong>${esc(q)}</strong>".</div><button class="btn" style="max-width:260px;margin:16px auto 0" onclick="criarDaPesquisa()">➕ Criar «${esc(q)}»</button>`:'<div>Sem produtos.</div>';
    $('stockList').innerHTML=banner+'<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>'+semQ+'</div>';return;}
  const autoOpen=CURFILTER!=='todos'?'open':'';
  $('stockList').innerHTML=banner+list.map(p=>{
    const multi=p.variantes.length>1;
    const brands=Array.from(new Set(p.variantes.map(v=>v.marca).filter(Boolean)));
    const thumb=p.foto_url?`<img src="${esc(p.foto_url)}">`:initials(p.nome);
    const vrows=p.variantes.map(v=>{
      const vi=valStatus(v.validade);
      const valb=vi?`<span class="badge ${vi.kind}" style="flex:none" title="Validade">${vi.kind==='red'?'⚠ ':''}${vi.txt}</span>`:'';
      return `
      <div class="vrow">
        <span class="vb">${esc(v.marca||'—')}</span>
        <div class="vd"><span class="vref">${esc(v.ref)}</span>${v.descricao?' · '+esc(v.descricao):''}</div>
        ${valb}
        <div class="stepper">
          <button onclick="adjVar(${v.id},-1,event)">−</button>
          <span class="vq" id="vq-${v.id}">${v.quantidade||0}</span>
          <button onclick="adjVar(${v.id},1,event)">+</button>
          <button onclick="addCart(${v.id},event)" style="color:var(--ok)" title="Carrinho">🛒</button>
        </div>
      </div>`;}).join('');
    return `<div class="pcard">
      <div class="head" onclick="toggleVars('${p.id}')">
        <div class="pthumb">${thumb}</div>
        <div class="pinfo">
          <div class="pname">${esc(p.nome)}</div>
          <div class="pmeta">${esc(p.categoria||'')} ${statusBadge(p.total)} ${(()=>{const vs=p.variantes.map(v=>valStatus(v.validade)).filter(Boolean);const w=vs.some(x=>x.kind==='red')?'red':vs.some(x=>x.kind==='amber')?'amber':null;return w?`<span class="badge ${w}">${w==='red'?'Validade expirada':'Validade próxima'}</span>`:'';})()} ${brands.map(b=>`<span class="badge brand">${esc(b)}</span>`).join('')}</div>
        </div>
        <div class="pqty"><div class="big">${p.total}</div><div class="u">${multi?p.variantes.length+' marcas':'un'}</div></div>
      </div>
      <div class="variants ${autoOpen}" id="vars-${p.id}">
        ${vrows}
        <div style="padding:8px 2px 2px"><button class="btn sec" style="padding:9px" onclick="openEditProduto('${p.id}')">Editar produto</button></div>
      </div>
    </div>`;
  }).join('');
};
window.toggleVars=id=>$('vars-'+id).classList.toggle('open');

// ---------- ajustar quantidade rápida ----------
window.adjVar=async function(vid,delta,ev){
  ev&&ev.stopPropagation();
  const v=VARIDX[vid];if(!v)return;
  const nova=Math.max(0,(v.quantidade||0)+delta);
  if(nova===v.quantidade)return;
  v.quantidade=nova;
  const el=$('vq-'+vid);if(el)el.textContent=nova;
  await sb.from('imp_variantes').update({quantidade:nova}).eq('id',vid);
  await sb.from('imp_movimentos').insert({variante_id:vid,ref:v.ref,tipo:delta>0?'Entrada':'Saída',qty:Math.abs(delta),data:todayISO(),obs:'Ajuste rápido'});
  const p=PRODUTOS.find(x=>x.id===v.produto_id);if(p){p.total=p.variantes.reduce((s,x)=>s+(x.quantidade||0),0);renderStats();}
};

  $('fab').style.display=v==='stock'?'grid':'none';

};

window.openEntrada=function(){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.nav==='entrada'));
  iaProdutos=[];
  openSheet(`
    <h2 class="serif">Entrada de stock</h2>
    <div class="ssub">Por fatura (IA) ou manualmente</div>
    <div class="dz" id="iaDz" onclick="$('iaFile').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
      <div style="font-weight:600;color:var(--ink)">Ler fatura com IA</div>
      <div style="font-size:12.5px">Tira foto ou escolhe uma imagem da fatura</div>
    </div>
    <input id="iaFile" type="file" accept="image/*" capture="environment" class="hidden" onchange="lerFatura(this)">
    <div id="iaResult"></div>
    <div style="text-align:center;color:var(--muted);font-size:12.5px;margin:14px 0 8px">— ou manualmente —</div>
    <div class="field"><label>Referência</label><input id="mRef" placeholder="Ref. do produto" list="refList" oninput="checkRef()"><datalist id="refList">${Object.values(VARIDX).map(v=>`<option value="${esc(v.ref)}">`).join('')}</datalist></div>
    <div id="refInfo" style="font-size:12.5px;color:var(--muted);margin:-6px 0 10px"></div>
    <div class="row2">
      <div class="field"><label>Quantidade</label><input id="mQty" type="number" value="1" min="1"></div>
      <div class="field"><label>Data</label><input id="mData" type="date" value="${todayISO()}"></div>
    </div>
    <div id="mResult"></div>
    <button class="btn" onclick="entradaManual()">Registar entrada</button>
  `);
};
window.checkRef=function(){
  const ref=($('mRef').value||'').trim();
  const v=Object.values(VARIDX).find(x=>x.ref.toLowerCase()===ref.toLowerCase());
  const el=$('refInfo');
  if(!ref){el.textContent='';return;}
  if(v){const p=PRODUTOS.find(x=>x.id===v.produto_id);el.innerHTML=`✓ <strong>${esc(p?p.nome:'')}</strong> · ${esc(v.marca||'')} · stock atual: ${v.quantidade||0}`;el.style.color='var(--ok)';}
  else{el.textContent='Referência nova — será criada como produto novo.';el.style.color='var(--amber)';}
};
window.entradaManual=async function(){
  const ref=($('mRef').value||'').trim();
  const qty=parseInt($('mQty').value)||0;
  const data=$('mData').value||todayISO();
  if(!ref||qty<1){msg($('mResult'),'Indica referência e quantidade.','warn');return;}
  let v=Object.values(VARIDX).find(x=>x.ref.toLowerCase()===ref.toLowerCase());
  if(!v){
    // criar produto genérico + variante novos
    const{data:np,error:e1}=await sb.from('imp_produtos').insert({nome:ref,categoria:'Implante'}).select().single();
    if(e1){msg($('mResult'),'Erro: '+e1.message,'err');return;}
    const{data:nv,error:e2}=await sb.from('imp_variantes').insert({produto_id:np.id,ref,marca:'',quantidade:0}).select().single();
    if(e2){msg($('mResult'),'Erro: '+e2.message,'err');return;}
    v=nv;
  }
  const nova=(v.quantidade||0)+qty;
  await sb.from('imp_variantes').update({quantidade:nova}).eq('id',v.id);
  await sb.from('imp_movimentos').insert({variante_id:v.id,ref:v.ref,tipo:'Entrada',qty,data,obs:'Entrada manual'});
  msg($('mResult'),`Entrada registada ✓ (${ref}: ${v.quantidade||0} → ${nova})`,'ok');
  $('mRef').value='';$('mQty').value='1';$('refInfo').textContent='';
  await loadStock();
};

// ===== IA FATURA =====
window.lerFatura=async function(input){
  const file=input.files[0];if(!file)return;
  const dz=$('iaDz');dz.innerHTML='<span class="spin" style="border-color:rgba(27,146,198,.3);border-top-color:var(--primary)"></span><div style="margin-top:8px;font-weight:600;color:var(--ink)">A ler a fatura…</div>';
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const resp=await fetch(CONFIG.FATURA_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+CONFIG.SUPABASE_ANON_KEY},body:JSON.stringify({imageBase64:base64,mediaType:file.type||'image/jpeg'})});
    const data=await resp.json();
    resetDz();
    if(!data.ok)throw new Error(data.error||'Erro na IA');
    if(!data.produtos||!data.produtos.length){msg($('iaResult'),'A IA não encontrou produtos. Adiciona manualmente.','warn');return;}
    iaProdutos=data.produtos.map(p=>({ref:p.ref||'',quantidade:parseInt(p.quantidade)||1}));
    renderReviewIA(data.fornecedor,data.data);
  }catch(e){resetDz();msg($('iaResult'),'Erro: '+e.message,'err');}
};
function resetDz(){$('iaDz').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg><div style="font-weight:600;color:var(--ink)">Ler fatura com IA</div><div style="font-size:12.5px">Tira foto ou escolhe uma imagem da fatura</div>';}
function renderReviewIA(fornecedor,dataFat){
  let h=`<div style="background:#EAF4FA;border-radius:13px;padding:13px;margin-top:6px">
    <div style="font-weight:600;margin-bottom:8px">Encontrados ${iaProdutos.length} produto(s)${fornecedor?' · '+esc(fornecedor):''}</div>`;
  iaProdutos.forEach((p,i)=>{
    const known=Object.values(VARIDX).find(v=>v.ref.toLowerCase()===(p.ref||'').toLowerCase());
    h+=`<div style="display:flex;gap:8px;align-items:center;padding:7px 0;border-top:1px solid #d6e8f2">
      <input value="${esc(p.ref)}" oninput="iaProdutos[${i}].ref=this.value" style="flex:1;border:1px solid var(--line);border-radius:9px;padding:7px;font-family:ui-monospace,monospace;font-size:12.5px;${known?'':'background:#FBF1DA'}">
      <input type="number" value="${p.quantidade}" min="1" oninput="iaProdutos[${i}].quantidade=parseInt(this.value)||1" style="width:62px;border:1px solid var(--line);border-radius:9px;padding:7px;text-align:center">
      <button onclick="iaProdutos.splice(${i},1);renderReviewIAWrap()" style="color:var(--red);font-size:20px">×</button>
    </div>`;
  });
  h+=`</div>
    <div class="field" style="margin-top:10px"><label>Data da entrada</label><input id="iaData" type="date" value="${dataFat||todayISO()}"></div>
    <button class="btn ok" onclick="confirmarFaturaIA()" style="margin-top:4px">Confirmar entrada de ${iaProdutos.length} produto(s)</button>`;
  $('iaResult').innerHTML=h;
}

window.saidaManual=async function(){

  const tipo=$('sTipo').value, clin=$('sClin').value, obs=$('sObs').value, data=$('sData').value||todayISO();
  const v=Object.values(VARIDX).find(x=>x.ref.toLowerCase()===ref.toLowerCase());

window.guardarProduto=async function(pid){
  const p=PRODUTOS.find(x=>x.id==pid);
  const nome=$('epNome').value.trim();
  if(!nome){msg($('epResult'),'O nome não pode ficar vazio.','warn');return;}
  await sb.from('imp_produtos').update({nome,categoria:$('epCat').value,foto_url:$('epFoto').value.trim()||null}).eq('id',pid);
  const rows=[...$('epVars').querySelectorAll('.varedit')];
  const keptIds=[];
  for(const r of rows){
    const vid=r.dataset.vid;
    const payload={
      produto_id:Number(pid),
      ref:r.querySelector('.ev-ref').value.trim(),
      marca:r.querySelector('.ev-marca').value.trim(),
      descricao:r.querySelector('.ev-desc').value.trim()||null,
      preco:r.querySelector('.ev-preco').value!==''?Number(r.querySelector('.ev-preco').value):null,
      validade:r.querySelector('.ev-validade').value||null,
      quantidade:parseInt(r.querySelector('.ev-qty').value)||0
    };
    if(!payload.ref){continue;}
    if(vid){await sb.from('imp_variantes').update(payload).eq('id',vid);keptIds.push(Number(vid));}
    else{const{data:nv}=await sb.from('imp_variantes').insert(payload).select().single();if(nv)keptIds.push(nv.id);}
  }
  // apagar variantes removidas
  for(const v of p.variantes){if(!keptIds.includes(v.id))await sb.from('imp_variantes').delete().eq('id',v.id);}
  toast('Produto guardado ✓');closeSheet();await loadStock();
};
window.apagarProduto=async function(pid){
  if(!confirm('Apagar este produto e todas as suas variantes?'))return;
  await sb.from('imp_variantes').delete().eq('produto_id',pid);
  await sb.from('imp_produtos').delete().eq('id',pid);
  toast('Produto apagado');closeSheet();await loadStock();
};

window.criarProduto=async function(){
  const nome=$('npNome').value.trim();
  const ref=$('npRef').value.trim();
  if(!nome){msg($('npResult'),'Indica o nome genérico.','warn');return;}
  if(!ref){msg($('npResult'),'Indica a referência.','warn');return;}
  if(Object.values(VARIDX).some(v=>v.ref.toLowerCase()===ref.toLowerCase())){msg($('npResult'),'Essa referência já existe.','warn');return;}
  let prod=PRODUTOS.find(p=>p.nome.toLowerCase()===nome.toLowerCase());
  let prodId;
  if(prod){prodId=prod.id;}
  else{
    const{data:np,error}=await sb.from('imp_produtos').insert({nome,categoria:$('npCat').value}).select().single();
    if(error){msg($('npResult'),'Erro: '+error.message,'err');return;}
    prodId=np.id;
  }
  const qty=parseInt($('npQty').value)||0;
  const{data:nv,error:e2}=await sb.from('imp_variantes').insert({
    produto_id:prodId, ref, marca:$('npMarca').value.trim(),
    descricao:$('npDesc').value.trim()||null,
    preco:$('npPreco').value!==''?Number($('npPreco').value):null,
    validade:$('npVal').value||null,
    quantidade:qty
  }).select().single();
  if(e2){msg($('npResult'),'Erro: '+e2.message,'err');return;}
  if(qty>0)await sb.from('imp_movimentos').insert({variante_id:nv.id,ref,tipo:'Entrada',qty,data:todayISO(),obs:'Stock inicial'});
  toast(prod?'Marca adicionada ✓':'Produto criado ✓');closeSheet();await loadStock();

function initRelatorio(){
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const now=new Date();
  $('relMes').innerHTML=meses.map((m,i)=>`<option value="${i}" ${i===now.getMonth()?'selected':''}>${m}</option>`).join('');
  const anos=[];for(let a=now.getFullYear();a>=now.getFullYear()-3;a--)anos.push(a);
  $('relAno').innerHTML=anos.map(a=>`<option ${a===now.getFullYear()?'selected':''}>${a}</option>`).join('');
  $('relResult').innerHTML='';
}
window.gerarRelatorio=async function(){
  const mes=parseInt($('relMes').value), ano=parseInt($('relAno').value);
  const ini=`${ano}-${String(mes+1).padStart(2,'0')}-01`;
  const fim=new Date(ano,mes+1,0).toISOString().slice(0,10);
  const{data:movs}=await sb.from('imp_movimentos').select('*').gte('data',ini).lte('data',fim).order('data');
  if(!movs||!movs.length){$('relResult').innerHTML='<div class="msg show warn">Sem movimentos neste mês.</div>';return;}
  const ent=movs.filter(m=>m.tipo==='Entrada').reduce((s,m)=>s+(m.qty||0),0);
  const sai=movs.filter(m=>['Saída','Colocação'].includes(m.tipo)).reduce((s,m)=>s+(m.qty||0),0);
  let h=`<div class="row2" style="margin-bottom:12px"><div class="stat"><div class="n" style="color:var(--ok)">${ent}</div><div class="l">Entradas</div></div><div class="stat"><div class="n" style="color:var(--red)">${sai}</div><div class="l">Saídas</div></div></div>`;
  h+=`<div style="max-height:280px;overflow-y:auto;border:1px solid var(--line);border-radius:12px">${movs.map(m=>`<div style="display:flex;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:13px"><span style="color:var(--muted);font-family:ui-monospace,monospace;font-size:11.5px">${fmtPT(m.data)}</span><span style="flex:1;font-family:ui-monospace,monospace">${esc(m.ref||'')}</span><span class="badge ${m.tipo==='Entrada'?'ok':m.tipo==='Correção'?'amber':'red'}">${esc(m.tipo)} ${m.qty}</span></div>`).join('')}</div>`;
  h+=`<button class="btn" style="margin-top:12px" onclick="enviarRelatorioEmail(${mes},${ano},${ent},${sai})">📧 Enviar por email</button><div id="relEnvio"></div>`;
  $('relResult').innerHTML=h;
};
window.enviarRelatorioEmail=async function(mes,ano,ent,sai){
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const ini=`${ano}-${String(mes+1).padStart(2,'0')}-01`,fim=new Date(ano,mes+1,0).toISOString().slice(0,10);
  const{data:movs}=await sb.from('imp_movimentos').select('*').gte('data',ini).lte('data',fim).order('data');
  const tbl=`<table style="width:100%;border-collapse:collapse;font-size:13px"><tr style="background:#f0f5f8"><th style="padding:7px;text-align:left">Data</th><th style="padding:7px;text-align:left">Ref</th><th style="padding:7px;text-align:left">Tipo</th><th style="padding:7px;text-align:center">Qt</th></tr>${movs.map(m=>`<tr><td style="padding:6px;border-top:1px solid #eee">${fmtPT(m.data)}</td><td style="padding:6px;border-top:1px solid #eee">${esc(m.ref||'')}</td><td style="padding:6px;border-top:1px solid #eee">${esc(m.tipo)}</td><td style="padding:6px;border-top:1px solid #eee;text-align:center">${m.qty}</td></tr>`).join('')}</table>`;
  const html=`<div style="font-family:Arial,sans-serif;max-width:640px;margin:0 auto"><div style="background:#1B92C6;padding:22px;border-radius:12px 12px 0 0;text-align:center;color:#fff"><div style="font-size:19px;font-weight:700">Relatório de Implantes</div><div style="font-size:14px;opacity:.8">${meses[mes]} ${ano}</div></div><div style="background:#fff;padding:22px;border:1px solid #e8edf2;border-top:none;border-radius:0 0 12px 12px"><p style="font-size:14px">Entradas: <strong>${ent}</strong> · Saídas: <strong>${sai}</strong></p>${tbl}<div style="margin-top:14px;font-size:12px;color:#a0aec0;text-align:center">Dentalsaúde</div></div></div>`;
  msg($('relEnvio'),'A enviar…','warn');
  try{
    const res=await fetch(CONFIG.RELATORIO_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+CONFIG.SUPABASE_ANON_KEY},body:JSON.stringify({tipo:'relatorio',para:CONFIG.EMAIL_ENCOMENDA,assunto:`Relatório implantes - ${meses[mes]} ${ano}`,html})});
    const d=await res.json();
    if(d&&(d.ok||d.success||res.ok))msg($('relEnvio'),'Relatório enviado ✓','ok');else throw new Error(d.error||'Erro');
  }catch(e){msg($('relEnvio'),'Erro: '+e.message,'err');}
};

// ===== EXPORTAR =====
window.openExport=function(){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  EXPCAT='Todas';EXPQ='';EXPSEL=new Set(PRODUTOS.map(p=>String(p.id)));
  const cats=['Todas',...CATEGORIAS];
  openSheet(`
    <h2 class="serif">Exportar produtos</h2>
    <div class="ssub">Escolhe os produtos e o formato</div>
    <div class="search" style="margin-bottom:10px"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg><input id="expQ" placeholder="Procurar…" oninput="EXPQ=this.value;expRenderList()"></div>
    <div class="chips" style="padding:0 0 8px;margin:0">${cats.map(c=>`<button class="chip ${c==='Todas'?'on':''}" data-ec="${esc(c)}" onclick="expSetCat('${esc(c)}')">${esc(c)}</button>`).join('')}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span id="expCount" style="font-size:13px;color:var(--muted);font-weight:500"></span>
      <div style="display:flex;gap:8px">
        <button class="btn sec" style="width:auto;padding:6px 12px;font-size:13px" onclick="expAll(true)">Todos</button>
        <button class="btn sec" style="width:auto;padding:6px 12px;font-size:13px" onclick="expAll(false)">Nenhum</button>
      </div>
    </div>
    <div id="expList" style="max-height:44vh;overflow-y:auto;border:1px solid var(--line);border-radius:13px"></div>
    <div class="btnrow" style="margin-top:14px">
      <button class="btn ok" onclick="exportExcel()">📊 Excel</button>
      <button class="btn red" onclick="exportPDF()">📄 PDF</button>
    </div>
  `);
  expRenderList();
};
window.expSetCat=function(c){EXPCAT=c;document.querySelectorAll('#sheet .chip').forEach(b=>b.classList.toggle('on',b.dataset.ec===c));expRenderList();};
function expFiltered(){
  let l=PRODUTOS.slice();
  if(EXPCAT!=='Todas')l=l.filter(p=>p.categoria===EXPCAT);
  const q=EXPQ.toLowerCase().trim();
  if(q)l=l.filter(p=>p.nome.toLowerCase().includes(q)||p.variantes.some(v=>(v.ref||'').toLowerCase().includes(q)||(v.marca||'').toLowerCase().includes(q)));
  return l.sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||a.nome.localeCompare(b.nome));
}
window.expRenderList=function(){
  const l=expFiltered();
  $('expList').innerHTML=l.map(p=>`<label style="display:flex;align-items:center;gap:11px;padding:10px 14px;border-bottom:1px solid var(--line)">
      <input type="checkbox" ${EXPSEL.has(String(p.id))?'checked':''} onchange="expToggle('${p.id}')" style="width:20px;height:20px;flex:none;accent-color:var(--primary)">
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">${esc(p.nome)}</div><div style="font-size:12px;color:var(--muted)">${esc(p.categoria||'—')} · ${p.variantes.length} marca(s) · ${p.total} un</div></div>
    </label>`).join('')||'<div style="padding:24px;text-align:center;color:var(--muted)">Sem produtos.</div>';
  expCount();
};
window.expToggle=id=>{id=String(id);EXPSEL.has(id)?EXPSEL.delete(id):EXPSEL.add(id);expCount();};
window.expAll=on=>{expFiltered().forEach(p=>{const k=String(p.id);on?EXPSEL.add(k):EXPSEL.delete(k);});expRenderList();};
function expCount(){const e=$('expCount');if(e)e.textContent=PRODUTOS.filter(p=>EXPSEL.has(String(p.id))).length+' selecionado(s)';}
function expRows(){
  const sel=PRODUTOS.filter(p=>EXPSEL.has(String(p.id))).sort((a,b)=>(a.categoria||'').localeCompare(b.categoria||'')||a.nome.localeCompare(b.nome));
  const rows=[];
  sel.forEach(p=>p.variantes.forEach(v=>rows.push({cat:p.categoria||'',nome:p.nome,marca:v.marca||'',ref:v.ref||'',desc:v.descricao||'',preco:v.preco,qty:v.quantidade||0,validade:v.validade||''})));
  return rows;
}
window.exportExcel=function(){
  if(typeof XLSX==='undefined'){toast('A carregar biblioteca… tenta de novo num instante');return;}
  const rows=expRows();
  if(!rows.length){toast('Seleciona pelo menos um produto');return;}
  const aoa=[['Produto','Marca','Referência','Quantidade']];
  rows.forEach(r=>aoa.push([r.nome,r.marca,r.ref,r.qty]));
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:36},{wch:14},{wch:16},{wch:12}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Produtos');
  XLSX.writeFile(wb,'produtos_'+todayISO()+'.xlsx');
  toast('Excel exportado ✓');
};
window.exportPDF=function(){
  if(!window.jspdf){toast('A carregar biblioteca… tenta de novo num instante');return;}
  const rows=expRows();
  if(!rows.length){toast('Seleciona pelo menos um produto');return;}
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.setFontSize(17);doc.setTextColor(27,146,198);doc.text('Lista de Produtos',14,18);
  doc.setFontSize(10);doc.setTextColor(120);doc.text('Dentalsaúde · '+fmtPT(todayISO()),14,25);
  let y=36;
  const byCat={};rows.forEach(r=>{(byCat[r.cat||'—']=byCat[r.cat||'—']||[]).push(r);});
  Object.keys(byCat).sort().forEach(cat=>{
    if(y>268){doc.addPage();y=18;}
    doc.setFillColor(234,244,250);doc.rect(14,y-5,182,8,'F');
    doc.setFontSize(11);doc.setTextColor(18,112,153);doc.text(cat,16,y);y+=9;
    doc.setFontSize(9);doc.setTextColor(120);
    doc.text('Produto',16,y);doc.text('Marca',120,y);doc.text('Referência',150,y);doc.text('Qt',186,y);y+=3;
    doc.setDrawColor(220);doc.line(14,y,196,y);y+=5;doc.setTextColor(40);doc.setFontSize(9);
    byCat[cat].forEach(r=>{
      if(y>284){doc.addPage();y=18;}
      doc.text(String(r.nome).slice(0,54),16,y);
      doc.text(String(r.marca).slice(0,14),120,y);
      doc.text(String(r.ref).slice(0,16),150,y);
      doc.text(String(r.qty),186,y);y+=6;
    });
    y+=6;
  });
  doc.save('produtos_'+todayISO()+'.pdf');
  toast('PDF exportado ✓');
};
