<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;background:#0a0a0a;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
  font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
}
img.logo{width:200px;max-width:72vw;margin-bottom:8px}
.sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:#4db8d4;margin-bottom:40px}
.box{width:100%;max-width:320px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lf input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;color:white;font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border-color 0.2s}
.lf input:focus{border-color:#4db8d4}
.lf input::placeholder{color:rgba(255,255,255,0.2)}
.btn{width:100%;padding:15px;border-radius:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.85);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px;transition:background 0.2s}
.btn:active{background:rgba(255,255,255,0.2)}
.err{color:#f87171;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
</style>

    err.textContent = 'Email ou password incorretos';
    btn.textContent = 'Entrar'; btn.disabled = false;
    return;
  }
  window.location.href = 'app.html';
});

document.getElementById('pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn').click();
});
</script>
